# Medthai Scraper Configuration
# Add or remove URLs to scrape different categories

[scraper]
# Delay between requests in seconds (be respectful to the server)
delay = 2.0

# Output directory
output_dir = output

# Categories to scrape (set to true/false)
[diseases]
enabled = true
url = https://medthai.com/%e0%b8%a3%e0%b8%b2%e0%b8%a2%e0%b8%8a%e0%b8%b7%e0%b9%88%e0%b8%ad%e0%b9%82%e0%b8%a3%e0%b8%84/
